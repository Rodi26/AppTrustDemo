name: AI Translate Service CI

on:
  push:
    branches:
      - main
    paths:
      - 'translate/**'
      - '.github/workflows/ai-translate-ci.yml'
  workflow_dispatch:

# env:
#   DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}

permissions:
  actions: read           # for detecting the Github Actions environment
  id-token: write         # for creating OIDC tokens for signing
  packages: write         # for uploading attestations
  contents: read          # read the contents permission
  security-events: write  # for uploading code scanning
  attestations: write     # Required for attestation

jobs:
  test:
    name: Test Python Service
    runs-on: ubuntu-latest
    env:
      JFROG_CLI_KEY_ALIAS: ${{ vars.JFROG_CLI_KEY_ALIAS }}
      JFROG_CLI_SIGNING_KEY: ${{ secrets.JFROG_CLI_SIGNING_KEY }}
      JF_PROJECT: ${{ vars.JF_PROJECT }}
      SOURCE_BUILD_NAME: "ai-translate"
      DOCKER_REGISTRY_PREFIX: ${{ vars.DOCKER_REGISTRY_PREFIX }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        # Note: cache disabled because we use --no-cache-dir to save disk space
        
    - name: Install dependencies and run tests
      run: |
        cd translate
        # Install only production dependencies for testing
        pip install --no-cache-dir -r requirements-optimized.txt
        # Install minimal test dependencies
        pip install --no-cache-dir pytest pytest-asyncio
        mkdir -p test-results
        python -m pytest tests/ -v --tb=short --junitxml=test-results/junit.xml

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ai-translate-test-results
        path: translate/test-results/junit.xml
        retention-days: 7

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    env:
      JFROG_CLI_KEY_ALIAS: ${{ vars.JFROG_CLI_KEY_ALIAS }}
      JFROG_CLI_SIGNING_KEY: ${{ secrets.JFROG_CLI_SIGNING_KEY }}
      PROJECT_DOCKER_DEV_REPO: ${{ vars.PROJECT_DOCKER_DEV_REPO }}
      JF_PROJECT: ${{ vars.JF_PROJECT }}
      SOURCE_BUILD_NAME: "ai-translate"
      DOCKER_REGISTRY_PREFIX: ${{ vars.DOCKER_REGISTRY_PREFIX }}
      JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
      JF_USER: ${{ vars.JF_USER }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    needs: test
    outputs: 
      build_name: ${{ steps.publish_build.outputs.build_name }}
      build_number: ${{ steps.publish_build.outputs.build_number }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Setup JFrog CLI
      uses: jfrog/setup-jfrog-cli@v5
      with:
        version: latest
        custom-server-id: evidence-demo
        oidc-provider-name: btcwallet-gh
        oidc-audience: btcwallet-gh
      id: setup-cli
      env:
        JF_URL: ${{ vars.JF_URL }}
        JF_PROJECT: ${{ vars.JF_PROJECT }}

    - name: SonarQube scan
      uses: SonarSource/sonarqube-scan-action@v7
      continue-on-error: true
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        projectBaseDir: translate/
        args: >
          -Dsonar.organization=my-evidence-test-org1
          -Dsonar.projectKey=my-evidence-test-org1_ai-translate
          -Dsonar.python.version=3.11
          -Dsonar.qualitygate.wait=false

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to Docker Registry
      run: |
        echo "🔐 Logging into JFrog Artifactory Docker registry..."
        echo "Registry: ${{ env.DOCKER_REGISTRY_PREFIX }}/${{ env.PROJECT_DOCKER_DEV_REPO }}"
        echo "$JF_ACCESS_TOKEN" | docker login -u "$JF_USER" --password-stdin ${{ env.DOCKER_REGISTRY_PREFIX }}/${{ env.PROJECT_DOCKER_DEV_REPO }}
        echo "✅ Successfully logged into Docker registry"
      
    - name: Build and Push Docker image
      id: build-and-push
      run: |
        cd translate
        # Build single platform AMD64 image
        jf docker buildx build --platform linux/amd64 \
          --cache-from type=registry,ref=${{ env.DOCKER_REGISTRY_PREFIX }}/${{ env.PROJECT_DOCKER_DEV_REPO }}/${{ env.SOURCE_BUILD_NAME }}:cache \
          --cache-to type=registry,ref=${{ env.DOCKER_REGISTRY_PREFIX }}/${{ env.PROJECT_DOCKER_DEV_REPO }}/${{ env.SOURCE_BUILD_NAME }}:cache,mode=max \
          --tag ${{ env.DOCKER_REGISTRY_PREFIX }}/${{ env.PROJECT_DOCKER_DEV_REPO }}/${{ env.SOURCE_BUILD_NAME }}:${{ github.run_number }} \
          --metadata-file=build-metadata --output=type=image --push .
        jf rt build-docker-create ${{ env.PROJECT_DOCKER_DEV_REPO }}  \
          --project ${{ env.JF_PROJECT }} --image-file build-metadata --build-name ${{ env.SOURCE_BUILD_NAME }} --build-number ${{ github.run_number }}
        # Extract the image digest
        DIGEST=$(jq -r '.["containerimage.digest"]' build-metadata)
        echo "digest=$DIGEST" >> $GITHUB_OUTPUT
        echo "Extracted digest: $DIGEST"

    - name: Attest Docker Image with Build Provenance
      uses: actions/attest-build-provenance@v4
      with:
        # The 'oci://' prefix is required by JFrog to correctly parse the artifact type
        subject-name: oci://${{ env.DOCKER_REGISTRY_PREFIX }}/${{ env.PROJECT_DOCKER_DEV_REPO }}/${{ env.SOURCE_BUILD_NAME }}:${{ github.run_number }}
        subject-digest: ${{ steps.build-and-push.outputs.digest }}

    - name: Verify Docker image
      run: |
        echo "🔍 Verifying Docker image..."
        docker pull ${{ env.DOCKER_REGISTRY_PREFIX }}/${{ env.PROJECT_DOCKER_DEV_REPO }}/${{ env.SOURCE_BUILD_NAME }}:${{ github.run_number }}
        docker images ${{ env.DOCKER_REGISTRY_PREFIX }}/${{ env.PROJECT_DOCKER_DEV_REPO }}/${{ env.SOURCE_BUILD_NAME }}:${{ github.run_number }}
        echo "✅ Docker image verified"
        echo "ℹ️  Note: JFrog Platform automatically generates CycloneDX SBOMs and performs vulnerability scans when Docker images are pushed to Artifactory."

    - name: Download test results
      uses: actions/download-artifact@v4
      with:
        name: ai-translate-test-results
        path: translate/test-results

    - name: Create Test Evidence JSON
      run: |
        mkdir -p translate/evidence
        bash btcwallet/scripts/convert-test-reports.sh translate/test-results translate/test-evidence.json

    - name: Create test evidence on Docker image
      run: |
        echo "🔍 Creating pytest test evidence on Docker image..."
        jf evd create \
          --subject-repo-path ${{ env.PROJECT_DOCKER_DEV_REPO }}/${{ env.SOURCE_BUILD_NAME }}/${{ github.run_number }}/list.manifest.json \
          --project ${{ env.JF_PROJECT }} \
          --predicate translate/test-evidence.json \
          --predicate-type https://jfrog.com/evidence/test-results/v1 \
          --markdown translate/test-evidence.md \
          --provider-id junit

    - name: Create SonarQube evidence on Docker image
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        echo "🔍 Creating SonarQube evidence on Docker image..."
        SONAR_REPORT=""
        for loc in "translate/.sonar/report-task.txt" "translate/.scannerwork/report-task.txt" ".sonar/report-task.txt" ".scannerwork/report-task.txt"; do
          if [ -f "$loc" ]; then
            SONAR_REPORT="$loc"
            break
          fi
        done
        if [ -n "$SONAR_REPORT" ]; then
          echo "✅ SonarQube report-task.txt found at: $SONAR_REPORT"
          jf evd create \
            --package-name ${{ env.SOURCE_BUILD_NAME }} \
            --package-version ${{ github.run_number }} \
            --package-repo-name ${{ env.PROJECT_DOCKER_DEV_REPO }} \
            --project ${{ env.JF_PROJECT }} \
            --integration sonar
        else
          echo "⚠️ SonarQube report-task.txt not found — skipping SonarQube evidence (scan may have been skipped or failed)"
        fi

    - name: Publish buildinfo
      id: publish_build
      run: |
        jf rt build-add-git --project ${{ env.JF_PROJECT }} ${{ env.SOURCE_BUILD_NAME }} ${{ github.run_number }}
        jf rt build-publish --project ${{ env.JF_PROJECT }} ${{ env.SOURCE_BUILD_NAME }} ${{ github.run_number }}
        echo "build_name=${{ env.SOURCE_BUILD_NAME }}" >> $GITHUB_OUTPUT
        echo "build_number=${{ github.run_number }}" >> $GITHUB_OUTPUT

  create_jira_evidence:
    needs: build
    uses: ./.github/workflows/create-jira-evidence.yml
    secrets: inherit
    with: 
      build_name: ${{ needs.build.outputs.build_name }}
      build_number: ${{ needs.build.outputs.build_number }}
